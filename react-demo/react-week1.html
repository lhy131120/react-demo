<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>W1</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
			crossorigin="anonymous"
		/>
	</head>
	<body>
		<!-- React CDN environment -->
		<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
		<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
		<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

		<div id="root"></div>

		<script type="text/babel">
			const data = {
				imageUrl:
					"https://images.unsplash.com/photo-1542397284385-6010376c5337?q=80&w=1974&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",
				title: "Card Title You Know",
				describe: "Some quick example text to build on the card title and make up the bulk of the card's content.",
        name: ''
			};
      const fn = () => {
        return
      }

      const list = <div><li className="list-group-item">List 1</li>
                  <li className="list-group-item">List 2</li>
                  <li className="list-group-item">List 3</li></div>
      
      const arrList = [<li className="list-group-item">List 1</li>, <li className="list-group-item">List 2</li>, <li className="list-group-item">List 3</li>]          

			function App() {
				return (
					<div className="container">
						<div className="card w-50">
							<img src={data.imageUrl} className="card-img-top" />
							<div className="card-body">
								<h5 className="card-title">{data.title}</h5>
								<p className="card-text">{data.describe}</p>
								<a href="#" className="btn btn-primary">Go somewhere</a>
                <br />
                <ul className="list-group list-group-flush">
                  { /* 會把多餘的<div></div>包括在內 */}
                  { list }
                </ul>
                <br />
                <ul className="list-group list-group-flush">
                  { /* show raw structure, no <div>....</div> included */}
                  { arrList } 
                </ul>
							</div>
						</div>
					</div>
				);
			}

			const el = document.getElementById("root");
			const root = ReactDOM.createRoot(el);

			root.render(<App />);
		</script>
	</body>
</html>
